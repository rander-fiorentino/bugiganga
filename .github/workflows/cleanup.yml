name: Remove tracked node_modules

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone without checkout
        run: |
          git clone --no-checkout https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
          cd repo
          git sparse-checkout init --cone
          git sparse-checkout set .github apps docker packages
          git checkout main

      - name: Configure git
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove tracked node_modules
        working-directory: repo
        run: |
          COUNT=$(git ls-tree -r --name-only HEAD | grep -cE '^(node_modules|apps/backend/node_modules)/' || echo 0)
          echo "Files to remove: $COUNT"
          git ls-tree -r --name-only HEAD | grep -E '^(node_modules|apps/backend/node_modules)/' | git update-index --remove --stdin
          echo "Done"

      - name: Commit and push
        working-directory: repo
        run: |
          git diff --cached --stat
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove tracked node_modules"
            git push
          else
            echo "Nothing to commit"
          fi
