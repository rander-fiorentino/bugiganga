name: Remove tracked node_modules

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone without checkout
        run: |
          git clone --no-checkout https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} repo
          cd repo
          git sparse-checkout init --cone
          git sparse-checkout set .github apps docker packages
          git checkout main

      - name: Configure git
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove tracked node_modules via tree
        working-directory: repo
        run: |
          git ls-tree -r --name-only HEAD | grep -E '^node_modules/' > /tmp/nm_files.txt || true
          git ls-tree -r --name-only HEAD | grep -E '^apps/backend/node_modules/' >> /tmp/nm_files.txt || true
          wc -l /tmp/nm_files.txt
          if [ -s /tmp/nm_files.txt ]; then
            cat /tmp/nm_files.txt | xargs git rm --cached --ignore-unmatch
          else
            echo "No node_modules tracked"
          fi

      - name: Commit and push
        working-directory: repo
        run: |
          git status
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove tracked node_modules"
            git push
          else
            echo "Nothing to commit"
          fi
