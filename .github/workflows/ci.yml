name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run typecheck --workspaces --if-present

  test:
    name: Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vide_ia_test
      JWT_ACCESS_SECRET: test_access_secret_32chars_minimum
      JWT_REFRESH_SECRET: test_refresh_secret_32chars_minimum
      ANTHROPIC_API_KEY: sk-ant-test-key
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test --workspace=apps/backend -- --passWithNoTests

  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:packages --if-present
      - run: npm run build:extension --if-present

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: [typecheck, test, build-extension]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build:extension --if-present
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/extension/dist'
      - id: deployment
        uses: actions/deploy-pages@v4
